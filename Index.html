<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vital">
<meta name="theme-color" content="#0c0b10">
<title>Vital</title>
<style>
  :root{
    --void:#0c0b10; --ink:#15131c; --deep:#1d1a27; --raised:#272231;
    --border:#302a3c; --borderHi:#433b54; --muted:#6e6880; --text:#b6b0c6;
    --textHi:#ddd7ea; --white:#f5f2fb;
    --iron:#8a93a0;
    --red:#d14836; --redDim:#3a1d18;
    --blue:#3d7fb8; --blueDim:#16242f;
    --green:#3fa55f; --greenDim:#16271a; --greenBright:#5ed47e;
    --violet:#9b7dd4; --violetDim:#231d33; --violetBright:#b89ae8;
    --gold:#d4a84a; --goldDim:#2a2410; --goldBright:#f0c860;
    --ember:#d98c4a; --emberDim:#2e1d10;
    --teal:#46b3a8; --tealDim:#122926;
    --rose:#cf6f8f; --roseDim:#2e1620;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--void); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:16px; line-height:1.5; min-height:100vh; overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  ::-webkit-scrollbar{width:0;display:none;}

  .top{
    padding:calc(13px + env(safe-area-inset-top)) 18px 11px;
    background:linear-gradient(180deg,var(--ink),var(--void));
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:30;
    display:flex; align-items:center; justify-content:space-between;
  }
  .top h1{font-size:19px;font-weight:800;letter-spacing:1.5px;color:var(--white);display:flex;align-items:center;gap:7px;text-transform:uppercase;}
  .top h1 .mark{color:var(--teal);}
  .icon-btn{background:var(--raised);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:10px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .icon-btn:active{background:var(--deep);}

  .tabbar{display:flex;background:var(--ink);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
  .tabbar button{flex:1;background:none;border:none;color:var(--muted);padding:10px 4px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;border-bottom:2.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .tabbar button .ic{font-size:18px;}
  .tabbar button.on{color:var(--teal);border-bottom-color:var(--teal);}

  main{max-width:680px;margin:0 auto;padding:16px 14px 110px;}
  .fade{animation:f .35s ease;}
  @keyframes f{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .sec-title{font-size:23px;font-weight:800;color:var(--white);letter-spacing:.3px;margin:2px 0 2px;}
  .sec-sub{font-size:13px;color:var(--muted);margin-bottom:16px;}
  .back-link{background:none;border:none;color:var(--teal);font-size:14px;font-weight:700;cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:6px;margin-bottom:4px;}

  .card{background:var(--ink);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;}
  .card .accent{position:absolute;left:0;top:0;bottom:0;width:4px;}

  .btn{border:none;border-radius:11px;padding:13px 18px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.3px;font-family:inherit;}
  .btn:active{transform:scale(.98);}
  .btn-teal{background:linear-gradient(135deg,#3a9b91,var(--teal));color:#06201d;}
  .btn-ember{background:linear-gradient(135deg,#c87a3a,var(--ember));color:#1a0f06;}
  .btn-green{background:linear-gradient(135deg,#2e8c4a,var(--green));color:#06210f;}
  .btn-ghost{background:var(--raised);border:1px solid var(--border);color:var(--text);}
  .btn-full{width:100%;}
  .btn-add{background:var(--deep);border:1px dashed var(--borderHi);color:var(--iron);width:100%;padding:11px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;}

  /* tappable list cards */
  .pick{border-radius:13px;padding:16px;cursor:pointer;border:1.5px solid var(--border);background:var(--ink);position:relative;overflow:hidden;margin-bottom:10px;transition:transform .1s;}
  .pick:active{transform:scale(.985);}
  .pick .bar{position:absolute;left:0;top:0;bottom:0;width:4px;}
  .pick .nm{font-size:16px;font-weight:800;color:var(--white);letter-spacing:.3px;}
  .pick .meta{font-size:12px;color:var(--muted);margin-top:3px;}
  .pick .emoji{font-size:22px;margin-right:4px;}

  .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}

  /* exercise/log */
  .ex-card{background:var(--ink);border:1px solid var(--border);border-radius:14px;margin-bottom:11px;overflow:hidden;}
  .ex-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px;}
  .ex-head .nm{font-size:15.5px;font-weight:700;color:var(--white);line-height:1.25;}
  .ex-head .warn{color:var(--ember);}
  .ex-head .chev{color:var(--muted);font-size:15px;flex-shrink:0;transition:transform .2s;}
  .ex-card.open .chev{transform:rotate(90deg);}
  .last-pill{display:inline-flex;align-items:center;gap:5px;background:var(--violetDim);border:1px solid var(--violet);color:var(--violetBright);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:6px;}
  .last-pill.none{background:var(--deep);border-color:var(--border);color:var(--muted);}
  .ex-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border);}
  .ex-card.open .ex-body{display:block;}
  .ex-target{font-size:12px;color:var(--gold);margin:10px 0 4px;font-weight:600;}
  .ex-note{font-size:12px;color:var(--muted);font-style:italic;line-height:1.5;margin-bottom:10px;}
  .ex-swap{font-size:11px;color:var(--ember);background:var(--goldDim);border-radius:8px;padding:8px 10px;margin-top:8px;line-height:1.4;}

  .set-row{display:grid;grid-template-columns:38px 1fr 1fr 50px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
  .set-row.head span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700;text-align:center;}
  .set-row.head span:first-child{text-align:left;}
  .set-label{font-size:13px;font-weight:700;color:var(--iron);}
  .set-input{width:100%;background:var(--void);border:1.5px solid var(--border);border-radius:9px;padding:11px 4px;color:var(--white);font-size:17px;text-align:center;outline:none;font-weight:600;-moz-appearance:textfield;}
  .set-input::-webkit-outer-spin-button,.set-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .set-input:focus{border-color:var(--teal);background:#000;}
  .vs{font-size:17px;text-align:center;font-weight:800;}
  .vs.up{color:var(--greenBright);}.vs.down{color:var(--red);}.vs.same{color:var(--muted);}

  /* stats */
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
  .stat{background:var(--ink);border:1px solid var(--border);border-radius:12px;padding:15px;text-align:center;}
  .stat .v{font-size:26px;font-weight:800;line-height:1;}
  .stat .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:6px;font-weight:700;}
  .lift-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;background:var(--ink);border:1px solid var(--border);border-radius:11px;margin-bottom:8px;}
  .lift-row .nm{font-size:14px;color:var(--textHi);font-weight:600;}
  .lift-row .v{font-size:16px;font-weight:800;color:var(--greenBright);}
  .lift-row .v .u{font-size:11px;color:var(--muted);font-weight:600;}

  /* progress ring / bars */
  .ring-wrap{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;}
  .macro-bar{margin-bottom:12px;}
  .macro-bar .top-l{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
  .macro-bar .top-l .nm{color:var(--textHi);font-weight:600;}
  .macro-bar .top-l .v{color:var(--muted);font-weight:600;}
  .macro-bar .track{height:10px;background:var(--deep);border-radius:6px;overflow:hidden;}
  .macro-bar .fill{height:100%;border-radius:6px;transition:width .4s;}

  /* checklist */
  .check-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--ink);border:1px solid var(--border);border-radius:12px;margin-bottom:9px;cursor:pointer;}
  .check-row:active{background:var(--deep);}
  .check-box{width:26px;height:26px;border-radius:8px;border:2px solid var(--borderHi);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;}
  .check-row.done .check-box{background:var(--teal);border-color:var(--teal);color:#06201d;}
  .check-row.done .ct{color:var(--muted);text-decoration:line-through;}
  .check-row .ct{font-size:14.5px;color:var(--textHi);font-weight:600;flex:1;}
  .check-row .emoji{font-size:20px;}

  .empty{text-align:center;padding:40px 20px;color:var(--muted);}
  .empty .big{font-size:40px;margin-bottom:12px;opacity:.5;}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:f .2s;}
  .sheet{background:var(--ink);border-top:1px solid var(--borderHi);border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;padding:20px 18px calc(28px + env(safe-area-inset-bottom));}
  .sheet h2{font-size:20px;color:var(--white);font-weight:800;margin-bottom:6px;}
  .sheet p{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:12px;}
  .grab{width:40px;height:4px;background:var(--borderHi);border-radius:2px;margin:0 auto 16px;}
  .field-l{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin:12px 0 6px;display:block;}
  textarea,input[type=text],input[type=number],select{width:100%;background:var(--void);border:1.5px solid var(--border);border-radius:10px;padding:12px;color:var(--white);font-size:15px;font-family:inherit;outline:none;}
  textarea:focus,input:focus,select:focus{border-color:var(--teal);}
  input[type=number]{-moz-appearance:textfield;}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}

  .toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--teal);color:#06201d;padding:11px 22px;border-radius:24px;font-size:13px;font-weight:800;z-index:200;animation:tst 2.2s ease forwards;pointer-events:none;white-space:nowrap;}
  @keyframes tst{0%{opacity:0;transform:translate(-50%,10px);}12%{opacity:1;transform:translate(-50%,0);}85%{opacity:1;}100%{opacity:0;transform:translate(-50%,-8px);}}

  .pill-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
  .pill{padding:7px 13px;border-radius:20px;background:var(--deep);border:1px solid var(--border);font-size:13px;color:var(--text);cursor:pointer;font-weight:600;}
  .pill.on{background:var(--tealDim);border-color:var(--teal);color:var(--teal);}

  .tag{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;letter-spacing:.5px;text-transform:uppercase;}
  .divider{height:1px;background:var(--border);margin:16px 0;}
</style>
</head>

<script>
// ============================================================
// STORAGE + HELPERS
// ============================================================
const DB={get(k,f){try{const v=localStorage.getItem('vital_'+k);return v?JSON.parse(v):f;}catch{return f;}},set(k,v){try{localStorage.setItem('vital_'+k,JSON.stringify(v));return true;}catch{return false;}}};
function epley(w,r){return (w>0&&r>0)?Math.round(w*(1+r/30)*10)/10:0;}
function todayISO(){return new Date().toISOString().slice(0,10);}
function prettyDate(iso){const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function nowStamp(){return new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}

// custom splits the user builds
function getCustomSplits(){return DB.get('customSplits',[]);}
function allSplits(){return [YOUR_SPLIT, ...getCustomSplits(), ...SPLIT_LIBRARY];}
function findSplit(id){return allSplits().find(s=>s.id===id);}

// training history
function getHistory(){return DB.get('history',[]);}
function setHistory(h){DB.set('history',h);}
function lastPerf(exName){
  const hist=getHistory();let best=null;
  for(const s of hist)for(const set of s.sets)if(set.ex===exName){
    if(!best||s.date>best.date) best={date:s.date,w:set.w,reps:set.reps,e1rm:set.e1rm};
  }
  return best;
}
function bestE1RM(exName){const hist=getHistory();let b=0;for(const s of hist)for(const set of s.sets)if(set.ex===exName&&set.e1rm>b)b=set.e1rm;return b;}

// nutrition log: {date:[{n,c,p,cb,f}]}
function getFoodDay(d){return DB.get('food_'+d,[]);}
function setFoodDay(d,arr){DB.set('food_'+d,arr);}
function getTargets(){return DB.get('targets',NUTRITION_DEFAULTS);}

// biohack daily check: {date:[ids]}
function getChecks(d){return DB.get('bh_'+d,[]);}
function setChecks(d,arr){DB.set('bh_'+d,arr);}
function bhStreak(id){
  let streak=0;for(let i=0;i<400;i++){const d=new Date(Date.now()-i*86400000).toISOString().slice(0,10);if(getChecks(d).includes(id))streak++;else if(i>0)break;}return streak;
}

// body metrics: array {date, weight, sleep, energy, waist, arms, chest, thigh, notes}
function getBody(){return DB.get('body',[]);}
function setBody(b){DB.set('body',b);}
</script>

function exCard(e,idx){
  const last=lastPerf(e.n);
  const sets=draft[e.n]||[{w:'',reps:''}];
  const lastPill=last?`<span class="last-pill">⟲ ${last.w||'BW'}×${last.reps}${last.e1rm?' · '+last.e1rm:''}</span>`:`<span class="last-pill none">No history — set baseline</span>`;
  return `<div class="ex-card" id="card-${idx}">
    <div class="ex-head" onclick="toggleCard(${idx})">
      <div><div class="nm">${e.sh?'<span class="warn">⚠</span> ':''}${esc(e.n)}</div><div>${lastPill}</div></div>
      <div class="chev">›</div>

      ${e.note?`<div class="ex-note">${esc(e.note)}</div>`:''}
      <div class="set-row head"><span>Set</span><span>Weight</span><span>Reps</span><span>vs</span></div>
      <div id="sets-${idx}">${sets.map((st,si)=>setRow(idx,si,st,last)).join('')}</div>
      <button class="btn-add" onclick="addSet(${idx})">+ Add set</button>
      ${e.swap?`<div class="ex-swap">↻ ${esc(e.swap)}</div>`:''}
    </div>
  </div>`;
}
function setRow(idx,si,s,last){
  let vs='';
  if(s.w!==''&&s.reps!==''&&last&&last.e1rm){const cur=epley(parseFloat(s.w),parseFloat(s.reps));vs=cur>last.e1rm?'<span class="vs up">▲</span>':cur<last.e1rm?'<span class="vs down">▼</span>':'<span class="vs same">=</span>';}
  return `<div class="set-row">
    <span class="set-label">${si+1}</span>
    <input class="set-input" type="number" inputmode="decimal" placeholder="${last?last.w:'lbs'}" value="${s.w}" oninput="upd(${idx},${si},'w',this.value)">
    <input class="set-input" type="number" inputmode="numeric" placeholder="${last?last.reps:'reps'}" value="${s.reps}" oninput="upd(${idx},${si},'reps',this.value)">
    <span id="vs-${idx}-${si}">${vs}</span>
  </div>`;
}
function toggleCard(idx){document.getElementById('card-'+idx).classList.toggle('open');}
function curExs(){return findSplit(activeSplit).days[activeDay];}
function upd(idx,si,field,val){
  const exName=curExs()[idx].n;draft[exName][si][field]=val;
  const last=lastPerf(exName);const s=draft[exName][si];const cell=document.getElementById(`vs-${idx}-${si}`);
  if(cell){let vs='';if(s.w!==''&&s.reps!==''&&last&&last.e1rm){const cur=epley(parseFloat(s.w),parseFloat(s.reps));vs=cur>last.e1rm?'<span class="vs up">▲</span>':cur<last.e1rm?'<span class="vs down">▼</span>':'<span class="vs same">=</span>';}cell.innerHTML=vs;}
}
function addSet(idx){const exName=curExs()[idx].n;draft[exName].push({w:'',reps:''});const last=lastPerf(exName);document.getElementById('sets-'+idx).innerHTML=draft[exName].map((s,si)=>setRow(idx,si,s,last)).join('');}

function saveSession(){
  const s=findSplit(activeSplit);const sets=[];
  s.days[activeDay].forEach(e=>{(draft[e.n]||[]).forEach(st=>{if(st.w!==''||st.reps!==''){const w=parseFloat(st.w)||0,reps=parseFloat(st.reps)||0;if(reps>0)sets.push({ex:e.n,w,reps,e1rm:epley(w,reps)});}});});
  if(!sets.length){toast('Nothing logged yet');return;}
  let prs=0;sets.forEach(set=>{if(set.e1rm>0&&set.e1rm>bestE1RM(set.ex))prs++;});
  const hist=getHistory();hist.push({date:todayISO(),split:activeSplit,day:activeDay,sets,ts:nowStamp()});setHistory(hist);
  toast(prs>0?`Saved · ${prs} PR${prs>1?'s':''}! 🏆`:'Session saved ✓');
  trainView='stats';refresh();window.scrollTo(0,0);
}

function statsView(){
  const hist=getHistory();
  if(!hist.length)return `<div class="fade"><button class="back-link" onclick="trainView='picker';refresh();">‹ Back</button><div class="empty"><div class="big">📈</div><div style="font-size:17px;color:var(--textHi);font-weight:700;margin-bottom:6px">No stats yet</div><div>Log a session and your PRs, strength, and anti-skip counters appear here.</div></div></div>`;
  let tonnage=0,setCount=0,prCount=0;const dates=new Set();let legSets=0,coreSets=0;const bestMap={};
  const legRe=/squat|leg|calf|bulgarian|lunge/i,coreRe=/ab |oblique|russian|plank|woodchop|leg raise|l-sit|crunch/i;
  const seen={};
  hist.forEach(s=>{dates.add(s.date);s.sets.forEach(set=>{tonnage+=set.w*set.reps;setCount++;if(legRe.test(set.ex))legSets++;if(coreRe.test(set.ex))coreSets++;if(!bestMap[set.ex]||set.e1rm>bestMap[set.ex])bestMap[set.ex]=set.e1rm;if(set.e1rm>0){if(!seen[set.ex]||set.e1rm>seen[set.ex]){seen[set.ex]=set.e1rm;prCount++;}}});});
  const lifts=Object.entries(bestMap).filter(([k,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const holds={};hist.forEach(s=>s.sets.forEach(set=>{if(/hold|l-sit|planche|support/i.test(set.ex)){if(!holds[set.ex]||set.reps>holds[set.ex])holds[set.ex]=set.reps;}}));
  return `<div class="fade">
    <button class="back-link" onclick="trainView='picker';refresh();">‹ Back to splits</button>
    <div class="sec-title">Stats</div>
    <div class="sec-sub">Your training by the numbers</div>
    <div class="stat-grid">
      <div class="stat"><div class="v" style="color:var(--greenBright)">${dates.size}</div><div class="l">Sessions</div></div>
      <div class="stat"><div class="v" style="color:var(--gold)">${prCount}</div><div class="l">PRs Hit</div></div>
      <div class="stat"><div class="v" style="color:var(--iron)">${Math.round(tonnage).toLocaleString()}</div><div class="l">Total Lbs</div></div>
      <div class="stat"><div class="v" style="color:var(--iron)">${setCount}</div><div class="l">Total Sets</div></div>
    </div>
    <div class="sec-sub" style="margin:18px 0 10px;color:var(--ember);font-weight:700">⚠ ANTI-SKIP TRACKER</div>
    <div class="stat-grid">
      <div class="stat"><div class="v" style="color:var(--ember)">${legSets}</div><div class="l">Leg Sets</div></div>
      <div class="stat"><div class="v" style="color:var(--ember)">${coreSets}</div><div class="l">Core Sets</div></div>
    </div>
    ${(legSets===0||coreSets===0)?`<div class="ex-swap" style="margin-bottom:16px">${legSets===0?'No leg work logged yet. ':''}${coreSets===0?'No core work logged yet. ':''}Keep the old habit from creeping back.</div>`:''}
    ${lifts.length?`<div class="sec-sub" style="margin:18px 0 10px">💪 BEST e1RM PER LIFT</div>${lifts.map(([nm,v])=>`<div class="lift-row"><span class="nm">${esc(nm)}</span><span class="v">${v}<span class="u"> lb</span></span></div>`).join('')}`:''}
    ${Object.keys(holds).length?`<div class="sec-sub" style="margin:18px 0 10px">🤸 BEST HOLDS</div>${Object.entries(holds).sort((a,b)=>b[1]-a[1]).map(([nm,v])=>`<div class="lift-row"><span class="nm">${esc(nm)}</span><span class="v" style="color:var(--violet)">${v}<span class="u"> sec</span></span></div>`).join('')}`:''}
  </div>`;
}
</script>
<script>
// ============================================================
// SPLIT BUILDER
// ============================================================
let buildDraft={name:'',emoji:'🛠',days:{}};
function builderView(){
  return `<div class="fade">
    <button class="back-link" onclick="trainView='picker';refresh();">‹ Cancel</button>
    <div class="sec-title">Build a Split</div>
    <div class="sec-sub">Name it, add days, add exercises. Saves to your splits.</div>
    <label class="field-l">Split Name</label>
    <input type="text" id="bName" placeholder="e.g. My Summer Cut" value="${esc(buildDraft.name)}" oninput="buildDraft.name=this.value">
    <label class="field-l">Days</label>
    <div id="buildDays">${renderBuildDays()}</div>
    <button class="btn-add" style="margin-top:10px" onclick="addBuildDay()">+ Add a day</button>
    <button class="btn btn-teal btn-full" style="margin-top:16px" onclick="saveBuild()">Save Split</button>
  </div>`;
}
function renderBuildDays(){
  const keys=Object.keys(buildDraft.days);
  if(!keys.length)return `<div style="color:var(--muted);font-size:13px;font-style:italic;padding:8px 0">No days yet. Add one below.</div>`;
  return keys.map((dn,di)=>`<div class="card" style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <input type="text" value="${esc(dn)}" onchange="renameBuildDay('${dn.replace(/'/g,"\\'")}',this.value)" style="font-weight:700;font-size:15px;padding:8px;flex:1">
      <button class="icon-btn" style="margin-left:8px" onclick="delBuildDay('${dn.replace(/'/g,"\\'")}')">✕</button>
    </div>
    ${buildDraft.days[dn].map((e,ei)=>`<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
      <input type="text" value="${esc(e.n)}" placeholder="Exercise" onchange="updBuildEx('${dn.replace(/'/g,"\\'")}',${ei},'n',this.value)" style="flex:2;padding:9px;font-size:13px">
      <input type="text" value="${esc(e.target)}" placeholder="reps" onchange="updBuildEx('${dn.replace(/'/g,"\\'")}',${ei},'target',this.value)" style="flex:1;padding:9px;font-size:13px">
      <button class="icon-btn" onclick="delBuildEx('${dn.replace(/'/g,"\\'")}',${ei})">✕</button>
    </div>`).join('')}
    <button class="btn-add" style="margin-top:4px" onclick="addBuildEx('${dn.replace(/'/g,"\\'")}')">+ exercise</button>
  </div>`).join('');
}
function refreshBuild(){document.getElementById('buildDays').innerHTML=renderBuildDays();}
function addBuildDay(){let n=1;while(buildDraft.days['Day '+n])n++;buildDraft.days['Day '+n]=[{n:'',sets:3,target:'',note:'',sh:false,swap:''}];refreshBuild();}
function renameBuildDay(oldN,newN){if(!newN||newN===oldN)return;const d=buildDraft.days;const entries=Object.entries(d);buildDraft.days={};entries.forEach(([k,v])=>{buildDraft.days[k===oldN?newN:k]=v;});refreshBuild();}
function delBuildDay(dn){delete buildDraft.days[dn];refreshBuild();}
function addBuildEx(dn){buildDraft.days[dn].push({n:'',sets:3,target:'',note:'',sh:false,swap:''});refreshBuild();}
function updBuildEx(dn,ei,f,v){buildDraft.days[dn][ei][f]=v;}
function delBuildEx(dn,ei){buildDraft.days[dn].splice(ei,1);refreshBuild();}
function saveBuild(){
  if(!buildDraft.name.trim()){toast('Name your split');return;}
  const keys=Object.keys(buildDraft.days);
  if(!keys.length){toast('Add at least one day');return;}
  // clean empties
  const days={};keys.forEach(dn=>{const exs=buildDraft.days[dn].filter(e=>e.n.trim());if(exs.length)days[dn]=exs.map(e=>({...e,sets:e.sets||3}));});
  if(!Object.keys(days).length){toast('Add some exercises');return;}
  const custom=getCustomSplits();
  custom.push({id:'custom_'+Date.now(),name:buildDraft.name.trim(),emoji:'🛠',color:'var(--teal)',tag:'CUSTOM',desc:'Your custom split',days});
  DB.set('customSplits',custom);
  buildDraft={name:'',emoji:'🛠',days:{}};
  toast('Split saved');trainView='picker';refresh();
}
function delCustom(id){if(confirm('Delete this split? Logged history stays.')){DB.set('customSplits',getCustomSplits().filter(s=>s.id!==id));refresh();toast('Split deleted');}}
</script>

function rmBody(idx){const body=getBody();body.splice(idx,1);setBody(body);refresh();}

<script>
// ============================================================
// SHEET MODAL + DATA MGMT
// ============================================================
function sheet(html){const o=document.createElement('div');o.className='overlay';o.id='activeSheet';o.onclick=(e)=>{if(e.target===o)o.remove();};o.innerHTML=`<div class="sheet"><div class="grab"></div>${html}</div>`;document.body.appendChild(o);}
function closeSheet(){document.getElementById('activeSheet')?.remove();}

function openData(){
  const hist=getHistory();
  sheet(`<h2>Data & Backup</h2>
    <p>Everything lives on this device. Back up here, or set up Google Sheets sync (in the guide) to go cross-device.</p>
    <button class="btn btn-teal btn-full" style="margin-bottom:10px" onclick="exportData()">⬇ Export Backup</button>
    <button class="btn btn-ghost btn-full" style="margin-bottom:10px" onclick="document.getElementById('impFile').click()">⬆ Import Backup</button>
    <input type="file" id="impFile" accept=".json" style="display:none" onchange="importData(this)">
    <label class="field-l">Sessions logged</label><p style="margin:0">${hist.length} workouts on this device</p>
    <label class="field-l" style="margin-top:18px">Danger Zone</label>
    <button class="btn btn-ghost btn-full" style="color:var(--red);border-color:var(--redDim)" onclick="wipeAll()">Erase all data</button>`);
}
function exportData(){
  const data={app:'Vital',version:1,exported:new Date().toISOString(),history:getHistory(),customSplits:getCustomSplits(),targets:getTargets(),body:getBody()};
  // include food + biohack days
  const food={},bh={};for(let k in localStorage){if(k.startsWith('vital_food_'))food[k]=localStorage[k];if(k.startsWith('vital_bh_'))bh[k]=localStorage[k];}
  data.food=food;data.biohack=bh;
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='vital-backup-'+todayISO()+'.json';a.click();URL.revokeObjectURL(url);toast('Backup exported');
}
function importData(input){
  const file=input.files[0];if(!file)return;const reader=new FileReader();
  reader.onload=(e)=>{try{const data=JSON.parse(e.target.result);if(!data.history&&!data.app){toast('Not a Vital backup');return;}
    if(confirm('Import this backup? Replaces current data.')){
      if(data.history)setHistory(data.history);if(data.customSplits)DB.set('customSplits',data.customSplits);if(data.targets)DB.set('targets',data.targets);if(data.body)setBody(data.body);
      if(data.food)for(let k in data.food)localStorage[k]=data.food[k];
      if(data.biohack)for(let k in data.biohack)localStorage[k]=data.biohack[k];
      closeSheet();render();toast('Data imported');
    }}catch{toast('Could not read file');}};
  reader.readAsText(file);
}
function wipeAll(){if(confirm('Erase ALL data permanently? Export a backup first.')){if(confirm('Really sure? Cannot be undone.')){for(let k in localStorage)if(k.startsWith('vital_'))localStorage.removeItem(k);render();toast('All data erased');}}}

// BOOT
render();
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>VITAL — Body &amp; Spirit OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0A0E0C;--night-2:#10160F;--panel:#141C16;--panel-2:#1C271E;--line:#293A2E;
  --gold:#C2A04F;--gold-soft:#E2C681;--ember:#BC5A45;--ember-soft:#DC8970;
  --violet:#54B08C;--violet-soft:#8CD8B6;--sage:#7FA68C;--parch:#ECE6D6;
  --text:#E2EAE2;--text-dim:#94A89B;--text-faint:#637268;--ok:#54B08C;--warn:#C9974B;
  --radius:14px;--shadow:0 10px 30px rgba(0,0,0,.5);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--night);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{overscroll-behavior-y:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
::selection{background:var(--gold);color:var(--night)}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.app{max-width:760px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:84px;background:radial-gradient(1200px 600px at 50% -10%, rgba(84,176,140,.12), transparent 60%),radial-gradient(800px 500px at 90% 10%, rgba(194,160,79,.06), transparent 55%),var(--night)}
.hdr{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:linear-gradient(to bottom, rgba(10,14,12,.94), rgba(10,14,12,.72));border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:baseline;gap:10px}
.brand h1{font-family:'Cinzel',serif;font-weight:700;font-size:20px;letter-spacing:4px;margin:0;color:var(--gold);text-shadow:0 0 18px rgba(194,160,79,.25)}
.brand .sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--text-faint);letter-spacing:.3px}
.hdr .streak{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--violet-soft);background:rgba(84,176,140,.08);border:1px solid rgba(84,176,140,.24);padding:5px 10px;border-radius:999px;font-weight:600}
.page{padding:18px 16px 8px;animation:rise .35s ease both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.eyebrow{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-faint);margin:0 0 4px}
.h-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;margin:0 0 2px;line-height:1.05}
.h-sub{color:var(--text-dim);font-size:14px;margin:2px 0 18px;max-width:56ch}
.card{background:linear-gradient(180deg,var(--panel),var(--night-2));border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.card.flat{box-shadow:none}
.row{display:flex;gap:12px}.row.wrap{flex-wrap:wrap}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:480px){.grid3{grid-template-columns:repeat(2,1fr)}}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;letter-spacing:.4px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);color:var(--text-dim);background:rgba(255,255,255,.02);text-transform:uppercase}
.pill.brass{color:var(--gold-soft);border-color:rgba(194,160,79,.3);background:rgba(194,160,79,.07)}
.pill.ox{color:var(--ember-soft);border-color:rgba(188,90,69,.34);background:rgba(188,90,69,.08)}
.pill.verd{color:var(--violet-soft);border-color:rgba(84,176,140,.34);background:rgba(84,176,140,.08)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 16px;border-radius:11px;font-weight:600;font-size:14px;background:var(--panel-2);border:1px solid var(--line);color:var(--text);transition:.15s}
.btn:hover{border-color:var(--gold);transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.btn.gold{background:linear-gradient(180deg,var(--gold),#9E7F38);color:#1B1404;border-color:transparent;box-shadow:0 6px 18px rgba(194,160,79,.28)}
.btn.gold:hover{filter:brightness(1.06)}
.btn.verd{background:linear-gradient(180deg,var(--violet),#3C8E6E);color:#04140D;border-color:transparent;box-shadow:0 6px 18px rgba(84,176,140,.26)}
.btn.ghost{background:transparent}
.btn.sm{padding:7px 11px;font-size:12.5px;border-radius:9px}
.btn.xs{padding:5px 9px;font-size:11.5px;border-radius:8px}
.btn.full{width:100%}
.btn.danger:hover{border-color:#C9554B;color:#E08a82}
.lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-faint);font-weight:600;margin-bottom:6px;display:block}
.in{width:100%;background:var(--night);border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--text);font-size:15px;outline:none;transition:.15s}
.in:focus{border-color:var(--gold)}
textarea.in{resize:vertical;min-height:90px;line-height:1.55}
.in.mini{padding:7px 9px;font-size:13px;border-radius:8px}
select.in{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--text-dim) 50%),linear-gradient(135deg,var(--text-dim) 50%,transparent 50%);background-position:calc(100% - 18px) 19px,calc(100% - 13px) 19px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
select.in.mini{background-position:calc(100% - 14px) 14px,calc(100% - 10px) 14px}
.kpi{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:34px;line-height:1;color:var(--gold-soft)}
.kpi.ox{color:var(--ember-soft)}.kpi.verd{color:var(--violet-soft)}
.divider{height:1px;background:var(--line);margin:14px 0;border:0}
.muted{color:var(--text-dim)}.faint{color:var(--text-faint)}
.serif{font-family:'Cormorant Garamond',serif}.center{text-align:center}
.card[data-acc="ox"]{border-left:3px solid var(--ember)}
.card[data-acc="brass"]{border-left:3px solid var(--gold)}
.card[data-acc="verd"]{border-left:3px solid var(--violet)}
.li{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
.li:last-child{border-bottom:0}.li .t{font-weight:600;font-size:15px}.li .d{font-size:12.5px;color:var(--text-dim);margin-top:2px}
.seg{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.seg::-webkit-scrollbar{display:none}
.seg button{white-space:nowrap;padding:8px 13px;border-radius:999px;font-size:13px;font-weight:600;border:1px solid var(--line);color:var(--text-dim);background:rgba(255,255,255,.02)}
.seg button.on{color:var(--night);background:var(--gold);border-color:transparent}
.seg.verd button.on{background:var(--violet)}
.seg.ox button.on{background:var(--ember);color:#fff}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:linear-gradient(to top,rgba(10,14,12,.98),rgba(16,22,15,.94));backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 4px calc(8px + env(safe-area-inset-bottom))}
.navwrap{max-width:760px;margin:0 auto;display:flex;justify-content:space-around}
.nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;color:var(--text-faint);font-size:9.5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;transition:.15s}
.nav a .ic{font-size:18px;line-height:1}
.nav a.on{color:var(--gold)}.nav a.on .ic{filter:drop-shadow(0 0 8px rgba(194,160,79,.5))}
.scrim{position:fixed;inset:0;z-index:60;background:rgba(5,8,6,.72);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;animation:fade .2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:760px;max-height:90vh;overflow-y:auto;background:var(--night-2);border:1px solid var(--line);border-bottom:0;border-radius:18px 18px 0 0;padding:18px 16px 30px;animation:slideup .28s cubic-bezier(.2,.7,.2,1) both}
@keyframes slideup{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.sheet .grab{width:38px;height:4px;border-radius:4px;background:var(--line);margin:0 auto 14px}
.pillar{position:relative;padding:20px 16px;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(180deg,rgba(84,176,140,.10),rgba(16,22,15,.4));overflow:hidden}
.pillar:before{content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;transform:translateX(-50%);background:linear-gradient(to bottom,transparent,var(--gold),var(--violet),var(--ember),transparent);opacity:.6}
.pillar .node{position:relative;text-align:center;padding:9px 0;z-index:1}
.pillar .node .dot{width:10px;height:10px;border-radius:50%;background:var(--gold);margin:0 auto 6px;box-shadow:0 0 12px var(--gold)}
.pillar .node.mid .dot{background:var(--violet);box-shadow:0 0 12px var(--violet)}
.pillar .node.below .dot{background:var(--ember);box-shadow:0 0 12px var(--ember)}
.pillar .node .lab{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--text-dim)}
.pillar .node .val{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text)}
.quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;line-height:1.4;color:var(--parch)}
.quote .by{display:block;font-style:normal;font-size:12px;letter-spacing:1px;color:var(--text-faint);margin-top:8px;text-transform:uppercase}
.tag{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:6px}
.tag.tr,.tag.fu,.tag.bh{color:var(--ember-soft);background:rgba(188,90,69,.13)}
.tag.pr{color:var(--gold-soft);background:rgba(194,160,79,.13)}
.tag.mi,.tag.qz{color:var(--violet-soft);background:rgba(84,176,140,.13)}
.tag.fr{color:var(--text-dim);background:rgba(255,255,255,.05)}
.step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.step:last-child{border:0}
.step .n{flex:none;width:24px;height:24px;border-radius:50%;border:1px solid var(--gold);color:var(--gold);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.step .x{font-size:14px;line-height:1.55;color:var(--text)}
.bar{height:9px;border-radius:8px;background:var(--night);overflow:hidden;border:1px solid var(--line)}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--ember),var(--gold));transition:width .4s}
.bar.verd > i{background:linear-gradient(90deg,var(--violet),var(--gold))}
.empty{text-align:center;padding:36px 20px;color:var(--text-faint)}.empty .big{font-size:30px;margin-bottom:8px;opacity:.5}
.opt{display:block;width:100%;text-align:left;padding:13px 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;font-size:14.5px;transition:.15s;background:rgba(255,255,255,.015)}
.opt:hover{border-color:var(--gold)}
.opt.correct{border-color:var(--ok);background:rgba(84,176,140,.13);color:#cdeadc}
.opt.wrong{border-color:#C9554B;background:rgba(201,85,75,.1);color:#e6b6b0}
.flash{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:80;background:var(--gold);color:#1B1404;font-weight:700;font-size:13px;padding:10px 18px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:flash 2.2s ease both}
@keyframes flash{0%{opacity:0;transform:translate(-50%,10px)}12%,80%{opacity:1;transform:translate(-50%,0)}100%{opacity:0}}
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.loading h1{font-family:'Cinzel';letter-spacing:6px;color:var(--gold);font-size:22px}
.spin{width:30px;height:30px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.macro{display:flex;gap:8px;font-size:11px;color:var(--text-faint);margin-top:3px}.macro b{color:var(--text-dim)}
.note{background:rgba(194,160,79,.07);border:1px solid rgba(194,160,79,.22);border-radius:12px;padding:12px 14px;margin-top:12px}
.note.verd{background:rgba(84,176,140,.07);border-color:rgba(84,176,140,.22)}
.note.warn{background:rgba(201,151,75,.08);border-color:rgba(201,151,75,.28)}
.xbtn{flex:none;width:26px;height:26px;border-radius:8px;border:1px solid var(--line);font-weight:700;color:var(--ember-soft)}
</style>
</head>

<div id="root"><div class="loading"><h1>VITAL</h1><div class="spin"></div><div style="color:#637268;font-size:12px;letter-spacing:2px">PREPARING THE TEMPLE…</div></div></div>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useRef}=React;
const Store=(()=>{let ok=false;const mem={};
 try{const k='__vital_test__';localStorage.setItem(k,'1');localStorage.removeItem(k);ok=true;}catch(e){ok=false;}
 return{available:ok,

 {id:"pushup",n:"Push-Up",cat:"Calisthenics",p:"Push",lv:"Foundation",cue:"Elbows ~45°, body one line, full lockout."},

const TRADITIONS=[
 {id:"wc",n:"Western Ceremonial",intro:"The Golden Dawn / hermetic-qabalistic stream you already train in — Kraig's Modern Magick lives here. Built on banishing, the Middle Pillar, and the Tree of Life. Disciplined, structured, repeatable. Your home base.",learn:["Kraig — Modern Magick","Regardie — The Golden Dawn","DuQuette — The Magick of Aleister Crowley"]},
 {id:"em",n:"Eastern Meditation",intro:"Concentration and insight — the training of attention itself, which every other practice runs on. Posture, breath, then the mind. Pairs directly with your nervous-system and gnosis work.",learn:["Culadasa — The Mind Illuminated","Ingram — Mastering the Core Teachings of the Buddha","B. Alan Wallace — The Attention Revolution"]},
 {id:"yoga",n:"Yoga",intro:"Strength and breath as a vehicle — asana to build the body, pranayama to dial the nervous system, holds as moving meditation. Where your physical and metaphysical training meet.",learn:["Iyengar — Light on Yoga","Saradananda — The Power of Breath","Breath & Flow (YouTube)"]},
 {id:"herm",n:"Hermeticism",intro:"The philosophical bedrock beneath Western magick: the Emerald Tablet and the seven principles of the Kybalion. Less ritual, more a lens for reality and a contemplative path. 'As above, so below' is its heart — and this app's.",learn:["The Kybalion (Three Initiates)","The Emerald Tablet","Hauck — The Emerald Tablet"]},
 {id:"chaos",n:"Chaos Magick",intro:"The pragmatic, results-first paradigm — exactly your stated approach. Belief is a tool you pick up and put down. Sigils, gnosis states, and 'whatever works.' Founded on Austin Osman Spare's sigil method.",learn:["Carroll — Liber Null & Psychonaut","Spare — The Book of Pleasure","Hine — Condensed Chaos"]},
 {id:"alch",n:"Alchemy",intro:"The Great Work as inner transformation — 'solve et coagula,' dissolve and recombine the self. The magnum opus (nigredo → albedo → rubedo) maps onto individuation and shadow work. Symbolic, deep, slow.",learn:["The Emerald Tablet","Jung — Psychology and Alchemy","Hauck — Sorcerer's Stone"]},
 {id:"norse",n:"Norse / Runic",intro:"Working with the Elder Futhark — runes as both an alphabet and a system of forces. Rune meditation, galdr (vibrated chanting), and bindrunes. A grounded, earthy Western current.",learn:["Thorsson — Futhark","Paxson — Taking Up the Runes","The Poetic Edda (Hávamál)"]},
 {id:"hellenic",n:"Hellenic / Theurgy",intro:"Greek devotional and Neoplatonic magic — daily devotion, hymns, and theurgy (the 'work of the gods' aimed at union with the divine). Iamblichus is the key source.",learn:["Iamblichus — On the Mysteries","The Orphic / Homeric Hymns","Butler — essays on Platonism"]},
 {id:"hoodoo",n:"Hoodoo / Folk Magic",intro:"African American folk magic of the American South — rootwork, candle and herb craft, practical 'conjure' aimed at real-life results. A living tradition rooted in Black history and community; approach with respect for its origins, not as aesthetic.",learn:["Yronwode — Hoodoo Herb and Root Magic","Chireau — Black Magic (history)","Best learned from its own practitioners"],respect:"A culturally rooted tradition born of African American history and enslavement. Study its context first; don't strip it for aesthetics."},

const PRACTICES=[
 {id:"qc",trad:"Western Ceremonial",n:"Qabalistic Cross",dur:"3 min",purpose:"Centering rite that sets you on the Middle Pillar. The opening of nearly every ceremonial working.",steps:["Face east, breathe until settled. Imagine brilliant white light above your crown.","Draw it to your forehead, touch it, vibrate Ah-teh (Thou art).","Draw it down to the chest, point down, vibrate Mal-kooth (the Kingdom).","Touch the right shoulder, vibrate ve-Geboo-rah (and the Power).","Touch the left shoulder, vibrate ve-Ged-oo-lah (and the Glory).","Clasp hands at the chest, vibrate le-Oh-lahm, Ah-men — feel the cross of light alive in you."],note:"Vibrate so you feel it resonate in the body. The seed of the Middle Pillar."},
 {id:"lbrp",trad:"Western Ceremonial",n:"Lesser Banishing Ritual of the Pentagram",dur:"10 min",purpose:"Clears and seals your space and sphere. Your daily foundation — banishing builds discipline before you ever invoke.",steps:["Perform the Qabalistic Cross to center.","Facing east, trace a banishing earth pentagram, stab the center, vibrate YHVH.","Carry the line south, trace, vibrate ADNI (Adonai).","West, trace, vibrate AHIH (Eheieh).","North, trace, vibrate AGLA. Return to east, closing the circle of fire.","Arms wide: before you Raphael, behind Gabriel, right Michael, left Auriel.","Declare the pentagrams flaming around you, the six-rayed star within. Close with the Qabalistic Cross."],note:"Daily for 30+ days before judging it. Consistency is the point — the rite trains the will."},
 {id:"mp",trad:"Western Ceremonial",n:"Middle Pillar",dur:"12 min",purpose:"Builds and circulates energy through your central column. Your charging / vitality rite.",steps:["Stand erect, breathe slow, begin with the Qabalistic Cross.","Crown (Kether): brilliant white sphere above the head — vibrate Eheieh.","Throat (Daath): lavender sphere — vibrate YHVH Elohim.","Heart (Tiphareth): golden sphere — vibrate YHVH Eloah ve-Daath.","Pelvis (Yesod): violet sphere — vibrate Shaddai El Chai.","Feet (Malkuth): earth-black sphere — vibrate Adonai ha-Aretz.","Circulate the light down one side, up the other, front to back, then fountain it up the center and shower down."],note:"Turns banishing-discipline into felt energy. Pair it with breath."},
 {id:"lbrh",trad:"Western Ceremonial",n:"Hexagram Ritual",dur:"12 min",purpose:"Works with planetary / macrocosmic forces (hexagram = higher, pentagram = elemental). Follows pentagram mastery.",steps:["Open with the Qabalistic Cross and usually the LBRP.","Perform the Analysis of the Keyword (I.N.R.I. / the L-V-X signs).","At each quarter, trace the hexagram forms, vibrating ARARITA.","Hold the planetary force at the center of each hexagram.","Close with the Analysis of the Keyword and the Qabalistic Cross."],note:"Only take this up once the pentagram rituals are stable and daily."},
 {id:"tarot",trad:"Western Ceremonial",n:"Tarot Contemplation Ritual",dur:"20 min",purpose:"Pathworking / scrying a single card — the Tarot as a living door, not a fortune-telling deck.",steps:["Banish (LBRP) and settle the breath. Choose one card.","Study it openly — colors, figures, symbols, the feeling.","Eyes closed, rebuild the image until vivid and stable.","Let the card expand to a doorway; step through in vision and let the scene unfold.","Interact, ask, receive — stay the witness, note without grabbing.","Return through the door, close it, banish, and immediately journal everything."],note:"Always journal straight after — the record is where meaning crystallizes. Your active-imagination bridge."},
 {id:"asana",trad:"Eastern Meditation",n:"Asana (Seated Posture)",dur:"5 min",purpose:"The still, comfortable seat. The body must learn stillness before the mind can be trained.",steps:["Sit cross-legged or on a chair, spine tall but not rigid, hips above knees.","Crown lifts, chin tucks slightly, shoulders drop, hands easy.","Scan for tension, release it on each exhale.","Hold without fidgeting for the set time — stillness itself is the practice."],note:"Patanjali: posture steady and comfortable. Master the seat and meditation becomes possible."},
 {id:"nadi",trad:"Eastern Meditation",n:"Nadi Shodhana (Alternate Nostril)",dur:"6 min",purpose:"Balancing pranayama that settles the system and primes the mind for focus or ritual.",steps:["Sit tall, right thumb and ring finger ready.","Close right nostril, inhale slow through the left.","Close left, release right, exhale right.","Inhale right, close, exhale left — that's one round.","5–10 smooth, silent rounds; then sit in the stillness it leaves."],note:"Pranayama is the dial between calm and charged states — the engine of gnosis."},
 {id:"samatha",trad:"Eastern Meditation",n:"Samatha (Breath Concentration)",dur:"15 min",purpose:"Single-pointed focus on the breath. Builds the attentional stability everything else draws on.",steps:["Settle the posture, three deeper breaths, then natural breathing.","Rest attention on the breath at the nostrils.","When the mind wanders, notice gently and return — the returning IS the rep.","As focus steadies, follow the full arc of each breath."],note:"The Mind Illuminated maps this in 10 stages. Catching the wander is the training, not the failure."},
 {id:"vipa",trad:"Eastern Meditation",n:"Vipassana (Noting)",dur:"15 min",purpose:"Open awareness and clear seeing — watching experience arise and pass to loosen identification.",steps:["A few minutes of breath to stabilize.","Widen attention to whatever's most prominent.","Softly note it ('hearing', 'thinking', 'tightness') and watch it change.","Don't chase or suppress; observe the flow. Return to breath if overwhelmed."],note:"The direct insight track — pairs with shadow work and the witness stance."},
 {id:"surya",trad:"Yoga",n:"Sun Salutation (Strength Flow)",dur:"10 min",purpose:"Breath-linked strength and mobility. Warms the body and builds the pushing base.",steps:["Mountain pose, inhale arms up.","Exhale fold; inhale half-lift, flat back.","Exhale step back to plank; lower through chaturanga with control.","Inhale upward dog; exhale downward dog, five breaths.","Step forward, half-lift, fold, rise. Repeat 5–10 rounds."],note:"Treat chaturanga like a strict push-up rep. Link every move to a breath."},
 {id:"strflow",trad:"Yoga",n:"Strength Asana Hold Flow",dur:"15 min",purpose:"Isometric strength through long holds — chair, warrior, plank — with breath and intention.",steps:["Chair (30–45s), warrior II each side, plank and side plank holds.","In each hold, breathe steady and place one intention in the body.","Use discomfort as the meditation object — stay present instead of escaping.","Finish in a deep squat or child's pose, releasing the effort."],note:"Where 'magickal meditation' meets strength — holding intention under load."},
 {id:"nidra",trad:"Yoga",n:"Yoga Nidra (Magickal Visualization)",dur:"20 min",purpose:"Yogic sleep — deep rest at the edge of consciousness, ideal for sigil charging and visualization.",steps:["Lie in savasana, fully comfortable, eyes closed.","Rotate awareness through the body part by part, releasing each.","Drop to the hypnagogic borderland — stay just on the waking side.","Hold your image or intention lightly there, then let it go entirely.","Rest, return slowly, and record anything that arose."],note:"The borderland bypasses the censor while you're still awake enough to direct it."},
 {id:"emerald",trad:"Hermeticism",n:"Emerald Tablet Contemplation",dur:"15 min",purpose:"Sit with the foundational hermetic text line by line, drawing out its meaning for your own work.",steps:["Settle and read one line slowly (e.g. 'as above, so below').","Close your eyes and let the meaning unfold without forcing.","Ask: where is this true in my body, mind, and life right now?","Move to the next line only when the first has given something.","Journal the insight in your own words."],note:"Contemplation, not ritual — depth over speed. One or two lines per session is plenty."},
 {id:"sevenp",trad:"Hermeticism",n:"The Seven Principles Review",dur:"10 min",purpose:"Run your day through the Kybalion's seven principles as a diagnostic lens.",steps:["Mentalism — what was I holding in mind, and what did it create?","Correspondence — where did inner mirror outer today?","Vibration — what was my dominant state?","Polarity — where could I shift a thing toward its opposite pole?","Rhythm — what cycle am I in (up, down, building, resting)?","Cause & Effect — what did I set in motion? Cause or effect?","Gender — where did I need more receptive vs. active energy?"],note:"A weekly run of this builds a genuinely hermetic way of seeing."},
 {id:"porebreath",trad:"Hermeticism",n:"Vital-Energy Breathing",dur:"8 min",purpose:"Bardon-style energy work — breathing in vitality and accumulating it in the body.",steps:["Sit erect, relaxed, breathe slow and natural.","On each inhale, imagine drawing in light/vitality from all around.","Feel it gather and condense in the body (often the solar plexus).","On the exhale, let tension and dullness leave.","After several minutes, sense the charge, then ground it — feet to earth."],note:"A gentle, foundational energy practice — close cousin to the Middle Pillar's circulation."},
 {id:"sigil",trad:"Chaos Magick",n:"Sigil Creation & Launch",dur:"15 min",purpose:"Spare's method — encode a desire into a glyph, charge it in gnosis, then forget it.",steps:["Write a clear statement of intent ('IT IS MY WILL TO…').","Strike repeated letters; combine what remains into one abstract glyph.","Refine until it no longer reads as words — just form.","Enter gnosis (peak arousal or deep stillness) and burn the glyph into mind.","Release it — laugh, distract, forget. Log it in the journal and DON'T lust for the result."],note:"The forgetting is the technique. Your pragmatic, results-testing streak lives here."},
 {id:"gnosis",trad:"Chaos Magick",n:"Gnosis State Training",dur:"10 min",purpose:"Train the altered states that charge any working — both the still (inhibitory) and the peak (excitatory).",steps:["Inhibitory: fix the eyes on a point, slow the breath, still the body until thought thins.","Hold the blank, single-pointed state as long as you can.","Excitatory (separate session): fast breath, drumming, or movement to a peak.","At the peak or in the stillness — that's the window to charge a sigil.","Note which comes easier and train the weaker one."],note:"Two doors to the same room. Pranayama and meditation are the same engine."},
 {id:"solve",trad:"Alchemy",n:"Solve et Coagula (Shadow Dissolution)",dur:"20 min",purpose:"The alchemical operation applied to the self — dissolve a fixed pattern, then recombine it higher.",steps:["Name one rigid pattern in yourself (the 'prima materia').","Solve — dissolve it: examine it honestly, feel it fully, let its grip soften (nigredo).","Sit in the openness that follows (albedo).","Coagula — recombine: choose the new, conscious response in its place (rubedo).","Journal the operation like a lab note in your magnum opus."],note:"Alchemy is individuation in symbolic dress. Real inner work, slow by design."},
 {id:"rune",trad:"Norse / Runic",n:"Rune Meditation & Galdr",dur:"12 min",purpose:"Take a single Elder Futhark rune into stillness, then sound it (galdr) to feel its force.",steps:["Choose one rune (Fehu, Uruz, Ansuz…). Study its shape and meanings.","Hold its form in the mind's eye until stable.","Galdr — vibrate/chant its name slowly, feeling where it resonates.","Hold its quality as a felt sense, not just an idea.","Journal what it evoked; build a personal rune record over time."],note:"Like the Tarot ritual — turn a symbol into a living, felt force through attention and voice."},
 {id:"devotion",trad:"Hellenic / Theurgy",n:"Daily Devotion",dur:"8 min",purpose:"A simple Neoplatonic/Hellenic rhythm — gratitude, offering, and aspiration toward the divine.",steps:["At a small space or candle, settle and purify (a breath, a splash of water).","Offer a moment of gratitude or short words of praise.","Make a simple offering (incense, water, words) with full attention.","Aspire — turn the mind upward toward the Good (theurgy's real aim is union, not bargaining).","Close with thanks and carry the orientation into the day."],note:"Theurgy is elevation of the soul, not transaction. Keep it sincere and simple."},
];

const MIND=[
 {id:"shadow",lens:"Jungian",n:"The Shadow",body:"Everything about yourself you've disowned and pushed out of awareness — not just the 'dark,' but any quality you judged unacceptable. What you can't stand in others is often your own shadow projected. Integration isn't acting it out; it's owning it so it stops running you from the basement.",practice:"List three people who irritate you intensely. Name the exact trait. Where does that live in me?",prompt:"What did I react to today out of proportion — and what might it show me about myself?"},
 {id:"active",lens:"Jungian",n:"Active Imagination",body:"Jung's method of dialoguing with the unconscious — letting an image or figure take form and engaging it as autonomous. Structurally identical to scrying and pathworking: drop into vision, meet a figure, let it speak. The discipline is staying witness, not steering with the ego.",practice:"Sit with a strong emotion or dream image. Let it personify. Ask what it wants. Write the exchange unedited.",prompt:"If today's strongest feeling could speak, what would it say it needs?"},
 {id:"persona",lens:"Jungian",n:"The Persona",body:"The mask you wear for the world — the curated self that meets social expectations. Useful and necessary, but dangerous when you mistake it for who you are. Over-identifying with the persona leaves the real self starved and the shadow swollen.",practice:"Name the mask you wore most today. What did it hide? What would dropping it have cost — and gained?",prompt:"Where am I performing a self instead of being one?"},
 {id:"individ",lens:"Jungian",n:"Individuation",body:"The lifelong process of becoming who you actually are — integrating shadow, anima/animus, and archetypes around the organizing center Jung called the Self. The psychological mirror of the Great Work: turning raw, scattered material into a unified, conscious whole.",practice:"Name one part of yourself you've been performing vs. one you've been hiding. What would integrating them look like?",prompt:"Am I moving toward who I am, or who I think I'm supposed to be?"},
 {id:"synch",lens:"Jungian",n:"Synchronicity",body:"Jung's term for meaningful coincidence — events linked by meaning rather than cause. Whether you read it as the psyche pattern-matching or as something stranger, treating striking coincidences as worth noting (without forcing meaning) is a doorway between inner and outer that magicians and Jung both walk.",practice:"Note one coincidence this week that carried a charge. What was happening inside you when it landed?",prompt:"What has reality seemed to underline for me lately?"},
 {id:"parts",lens:"IFS",n:"Parts & Self",body:"IFS sees the psyche as a system of parts: Managers (keep you functioning/controlled), Firefighters (douse pain reactively — numbing, lashing out), Exiles (young wounded parts carrying the original pain). Beneath them is the Self — calm, curious, compassionate. Healing is the Self getting to know the parts instead of being hijacked.",practice:"Notice a strong reaction. Which part is this? What is it protecting you from? Thank it.",prompt:"Which part drove most of today — and what was it afraid would happen if it let go?"},
 {id:"8cs",lens:"IFS",n:"The 8 C's of Self",body:"You're in Self when you feel the 8 C's: Calm, Curiosity, Clarity, Compassion, Confidence, Courage, Creativity, Connectedness. A live diagnostic — if you're blended with a part, one goes missing. Maps onto the magician's witness and the meditator's equanimity: the still center that observes parts without becoming them.",practice:"Rate each C 1–5 right now. The lowest shows which part is most active.",prompt:"Where was I in Self today, and where was I blended?"},
 {id:"unburden",lens:"IFS",n:"Unburdening",body:"In IFS, exiles carry 'burdens' — extreme beliefs and feelings taken on during painful moments ('I'm worthless,' 'I'm unsafe'). Healing is the Self witnessing the exile, letting it tell its story, and helping it release a burden it never had to carry. With a therapist, it's some of the deepest work there is.",practice:"Notice one harsh belief you carry about yourself. How old does it feel? That's likely an exile's burden, not the truth.",prompt:"What old belief have I mistaken for a fact about myself?"},
 {id:"ifs-jung",lens:"IFS",n:"IFS ↔ Jung ↔ Magick",body:"Three dialects for the same terrain. IFS 'parts' ≈ Jung's complexes/sub-personalities ≈ the magician's invoked forces and god-forms. Self ≈ the Jungian Self ≈ the witness / Holy Guardian Angel. Active imagination, parts dialogue, and pathworking are the same move: a conscious conversation with autonomous inner contents. Run them as one practice with your therapist, not three competing ones.",practice:"Take one inner figure. Describe it three ways — as a part, a complex, a force. Notice what each reveals.",prompt:"What inner figure keeps showing up across my therapy, journal, and practice?"},
 {id:"control",lens:"Stoic",n:"The Dichotomy of Control",body:"Epictetus' hinge: some things are up to us (judgments, choices, effort, attention) and some are not (outcomes, other people, the past). Suffering comes from gripping what isn't ours. Power and peace come from pouring everything into what is, and releasing the rest.",practice:"Take what's stressing you. Draw a line: my part vs. not my part. Act fully on the first; release the second.",prompt:"What did I waste energy trying to control today that was never mine?"},
 {id:"premed",lens:"Stoic",n:"Premeditatio Malorum",body:"The calm rehearsal of what could go wrong — not to breed anxiety but to defuse it and prepare. Face loss and difficulty in imagination ahead of time and you rob misfortune of its shock, and discover most fears shrink under examination.",practice:"Pick one upcoming challenge. Vividly imagine the worst plausible version, then plan your response. Notice the calm.",prompt:"What am I quietly afraid of — and what's my actual plan if it happens?"},
 {id:"amor",lens:"Stoic",n:"Amor Fati",body:"'Love of fate' — not just accepting what happens but willing it, treating every event, even the hard ones, as fuel and as exactly what was needed. The opposite of the victim stance. Nietzsche borrowed it from the Stoics and made it a battle cry.",practice:"Take one thing you've been resenting. Try on: 'this is mine, and I can use it.' What changes?",prompt:"What am I resisting that I could choose to use instead?"},
 {id:"memento",lens:"Stoic",n:"Memento Mori",body:"Remember you will die. Not morbid — clarifying. The certainty of death is the Stoic's sharpest tool for cutting through trivia and acting on what matters now. It's also the alchemist's nigredo and the magician's confrontation with the Abyss.",practice:"If this were your last year, what would you stop tolerating and start doing? Name one of each.",prompt:"Did I spend today on what matters, knowing it's finite?"},
 {id:"evening",lens:"Stoic",n:"Seneca's Evening Review",body:"Seneca ended each day interrogating it: what did I do well, badly, and could do better? Done honestly and without self-flagellation, it's the original journaling-for-growth — and it directly targets inconsistency and self-deception by making the day examinable.",practice:"Three questions tonight: where did I act from values? from impulse? what's the one adjustment for tomorrow?",prompt:"If I reviewed today honestly, with no spin, what would I have to admit?"},
 {id:"circuits",lens:"8-Circuit (RAW)",n:"The 8-Circuit Model",body:"Wilson's map (via Leary): 1 Bio-survival (safe/threatened), 2 Emotional-territorial (status/power), 3 Semantic (language/logic), 4 Socio-sexual (rules/morality) — the four terrestrial circuits we mostly run on. Then the higher: 5 Neurosomatic (bliss/body), 6 Neuroelectric (meta-programming), 7 Neurogenetic (archetypal/collective), 8 Non-local (the mystical). Magick and meditation are tools to access and re-program the upper circuits.",practice:"Which lower circuit is loudest right now — fear? status? logic-loops? guilt? Just name it.",prompt:"Which circuit ran the show today — did I choose it, or did it choose me?"},
 {id:"tunnels",lens:"8-Circuit (RAW)",n:"Reality Tunnels & 'Sombunall'",body:"Nobody perceives reality directly — everyone lives in a 'reality tunnel' built from their nervous system, language, and conditioning. The freeing move is agnosticism toward your own certainties: hold beliefs as tools, not truths. Wilson coined 'sombunall' (some-but-not-all) to break the brain's habit of false universals. The meta-skill behind your whole pragmatic approach.",practice:"Take a belief you're certain of. State it as 'In my current reality tunnel, X.' Feel it loosen.",prompt:"What did I treat as 'just the way it is' today that's actually just my tunnel?"},
 {id:"exercise",lens:"8-Circuit (RAW)",n:"The Prometheus Exercise",body:"Wilson assigned exercises to break automatic perception — e.g. spend a week deliberately hunting for evidence the world is improving, then a week hunting for decline, and watch how your nervous system manufactures whatever you look for. The point: you program your own reality tunnel whether you know it or not.",practice:"For the next 24h, hunt only for evidence that things are working in your favor. Log what you find.",prompt:"What did I find when I went looking for the good — and what does that say about attention?"},
 {id:"mentalism",lens:"Hermetic",n:"Mentalism",body:"'The All is Mind; the universe is mental.' The first hermetic principle — mind as the fundamental substrate, which is why attention, intention, and imagination are treated as causal in magick. Whatever your metaphysics, the pragmatic version is undeniable: where attention goes, energy flows.",practice:"Notice the dominant image you hold about your future. Is it the one you'd choose to install?",prompt:"What am I repeatedly imagining — and is it building the life I want?"},
 {id:"asabove",lens:"Hermetic",n:"As Above, So Below",body:"The Emerald Tablet's axiom: macrocosm and microcosm mirror each other — outer and inner, cosmos and psyche, ritual and life. Practically: your inner work shows up in your outer life and back again. Discipline in the body becomes discipline in the will; chaos in the mind leaks into the day. This app is built on it — body below, spirit above, one column between.",practice:"Find today's mirror: where did an inner state show up as an outer event, or vice versa?",prompt:"What is my outer life currently reflecting about my inner state?"},
 {id:"polarity",lens:"Hermetic",n:"Polarity & Rhythm",body:"Two hermetic principles working together. Polarity: opposites are two ends of one thing (love/hate, courage/fear are degrees on a scale), so you can shift along it. Rhythm: everything moves in cycles — the pendulum swings both ways. Knowing the rhythm lets you ride the down-swings without despair and the up-swings without arrogance.",practice:"Name your current emotional pole and its opposite. Then name the cycle you're in. Where's the pendulum?",prompt:"What pole am I stuck at that I could consciously shift — and what rhythm am I inside?"},
 {id:"tao",lens:"Eastern",n:"Wu Wei (Effortless Action)",body:"The Taoist art of not-forcing — acting with the grain of things rather than against it. Not passivity, but the skill of water wearing down stone: yielding, timing, flow. The antidote to a crisis-driven, white-knuckle pattern — sustainable practice is wu wei, not force.",practice:"Find one place today you're forcing. What would 'going with the grain' look like there instead?",prompt:"Where am I pushing against the current when I could be using it?"},
 {id:"anatta",lens:"Eastern",n:"Anatta & Impermanence",body:"Two of Buddhism's core marks: anatta (non-self — no fixed, solid 'you,' just a flowing process) and anicca (impermanence — everything arises and passes). Seen directly in meditation, they loosen the grip of ego and the fear of loss. They rhyme with IFS's 'no single self' and the magician's fluid identity.",practice:"Watch one thought arise and pass without grabbing it. Were you the thought, or the space it appeared in?",prompt:"What am I clinging to as permanent or as 'me' that's actually just passing through?"},
];

function App(){
  const [tab,setTab]=useStored("vital.tab","home");
  const [log,setLog]=useStored("vital.log",[]);
  const [mySplits,setMySplits]=useStored("vital.mysplits",[]);
  const [customEx,setCustomEx]=useStored("vital.customex",[]);
  const [framework,setFramework]=useStored("vital.framework",[]);
  const [profile,setProfile]=useStored("vital.profile",{bw:185,goal:"grow",act:"active"});
  const [scores,setScores]=useStored("vital.scores",{});
  const [foodLog,setFoodLog]=useStored("vital.foodlog",{});
  const [flash,setFlash]=useState("");
  const ping=(m)=>{setFlash(m);setTimeout(()=>setFlash(""),2200);};
  const addLog=(entry)=>{setLog(l=>[{id:uid(),ts:new Date().toISOString(),...entry},...l]);ping("Saved to Journal");};
  const streak=useMemo(()=>{
    const days=new Set(log.map(e=>e.ts.slice(0,10)));
    Object.keys(foodLog).forEach(d=>{if(foodLog[d]&&foodLog[d].length)days.add(d);});
    let n=0,d=new Date();
    while(days.has(d.toISOString().slice(0,10))){n++;d.setDate(d.getDate()-1);}
    return n;
  },[log,foodLog]);
  const allEx=useMemo(()=>[...customEx,...EX],[customEx]);
  const exById=(id)=>allEx.find(e=>e.id===id)||{id,n:id,p:"—",cat:"—",cue:""};
  const ctx={log,setLog,addLog,mySplits,setMySplits,customEx,setCustomEx,allEx,exById,framework,setFramework,profile,setProfile,scores,setScores,foodLog,setFoodLog,ping,streak,setTab};
  const NAV=[
    {k:"home",ic:"☉",l:"Today"},{k:"train",ic:"⚔",l:"Train"},{k:"fuel",ic:"🜂",l:"Fuel"},
    {k:"bio",ic:"🜔",l:"Hacks"},{k:"practice",ic:"☿",l:"Practice"},{k:"mind",ic:"🜍",l:"Mind"},
    {k:"journal",ic:"📖",l:"Journal"},{k:"test",ic:"✦",l:"Test"},
  ];
  return (
   <div className="app">
     <header className="hdr">
       <div className="brand"><h1>VITAL</h1><span className="sub">as above, so below</span></div>
       <div className="streak">🔥 {streak} day{streak===1?"":"s"}</div>

     {tab==="fuel"&&<Fuel ctx={ctx}/>}
     {tab==="bio"&&<Bio ctx={ctx}/>}
     {tab==="practice"&&<Practice ctx={ctx}/>}
     {tab==="mind"&&<Mind ctx={ctx}/>}
     {tab==="journal"&&<Journal ctx={ctx}/>}
     {tab==="test"&&<Test ctx={ctx}/>}
     {flash&&<div className="flash">{flash}</div>}
     <nav className="nav"><div className="navwrap">
       {NAV.map(n=>(<a key={n.k} className={tab===n.k?"on":""} onClick={()=>setTab(n.k)}><span className="ic">{n.ic}</span>{n.l}</a>))}
     </div></nav>
   </div>
  );
}
function targets(profile){
  const bw=Number(profile.bw)||185;
  const factor=profile.act==="active"?16:(profile.act==="mod"?15:13);
  const maint=Math.round(bw*factor);
  const adj=profile.goal==="grow"?400:(profile.goal==="lean"?-400:0);
  const cal=maint+adj;const pro=Math.round(bw*0.9);
  const fat=Math.round(cal*0.25/9);const carb=Math.round((cal-(pro*4)-(fat*9))/4);
  return {bw,maint,cal,pro,fat,carb,adj};
}
function TypeTag({t}){
  const map={workout:["tr","Train"],meal:["fu","Fuel"],practice:["pr","Practice"],mind:["mi","Mind"],quiz:["qz","Test"],free:["fr","Journal"],biohack:["bh","Hack"]};
  const [c,l]=map[t]||["fr",t];return <span className={"tag "+c}>{l}</span>;
}

       <div className="node below"><div className="dot"></div><div className="lab">BODY</div><div className="val">{counts.workout||0} train · {proToday}/{t.pro}g protein</div></div>
     </div>
     <p className="eyebrow" style={{marginTop:18}}>Quick Log</p>
     <div className="grid2">
       <button className="btn" onClick={()=>ctx.setTab("practice")}>☿ Begin a Practice</button>
       <button className="btn" onClick={()=>ctx.setTab("train")}>⚔ Start a Workout</button>
       <button className="btn" onClick={()=>ctx.setTab("fuel")}>🜂 Track Food</button>
       <button className="btn" onClick={()=>ctx.setTab("mind")}>🜍 Mind Lens</button>
     </div>
     {todayLogs.length>0&&<>
       <p className="eyebrow" style={{marginTop:20}}>Logged Today</p>
       <div className="card">{todayLogs.slice(0,6).map(e=>(
         <div className="li" key={e.id}><div><div className="t">{e.title}</div><div className="d">{fmtTime(e.ts)}</div></div><TypeTag t={e.type}/></div>))}</div>
     </>}
     {!Store.available&&<div className="note warn"><span className="pill" style={{color:"var(--warn)",borderColor:"rgba(201,151,75,.4)"}}>Preview mode</span>
       <p className="muted" style={{fontSize:13,margin:"8px 0 0"}}>Saved entries last only this session here. Deploy Vital to your own site and everything persists on your device automatically.</p></div>}
   </div>
  );
}
function Train({ctx}){
  const {exById,allEx}=ctx;
  const [view,setView]=useState("splits");
  const [active,setActive]=useState(null);
  const [editMode,setEditMode]=useState(false);
  const [done,setDone]=useState({});
  const [picker,setPicker]=useState(null);
  const [libCat,setLibCat]=useState("All");
  const [showAddEx,setShowAddEx]=useState(false);
  function openSplit(split){
    const mine=ctx.mySplits.some(s=>s.id===split.id);
    setActive({split:clone(split),dayIdx:0,sourceId:split.id,mine});
    setDone({});setEditMode(false);setView("session");
  }
  function commit(a){setActive({...a});}
  function setDay(i){commit({...active,dayIdx:i});setDone({});}
  function editItem(i,field,val){const a=clone(active);a.split.days[a.dayIdx].items[i][field]=val;commit(a);}
  function removeItem(i){const a=clone(active);a.split.days[a.dayIdx].items.splice(i,1);commit(a);}
  function doPick(exId){
    const a=clone(active);const day=a.split.days[picker.dayIdx];
    if(picker.mode==="swap")day.items[picker.itemIdx].ex=exId;
    else day.items.push({ex:exId,sets:3,reps:"10"});
    commit(a);setPicker(null);
  }
  function saveSplit(){
    if(active.mine){ctx.setMySplits(s=>s.map(x=>x.id===active.sourceId?active.split:x));ctx.ping("Changes saved");}
    else{const cs={...active.split,id:uid(),n:active.split.n+" (yours)"};ctx.setMySplits(s=>[cs,...s]);
      setActive({...active,sourceId:cs.id,mine:true,split:cs});ctx.ping("Saved to My Splits");}
  }
  function finish(){
    const day=active.split.days[active.dayIdx];
    const items=day.items.map(it=>exById(it.ex).n+" "+it.sets+"×"+it.reps).join(", ");
    ctx.addLog({type:"workout",title:active.split.n+" — "+day.n,body:items});
    setView("splits");setActive(null);
  }
  return (
   <div className="page">
     <p className="eyebrow">Body · The Substrate</p>
     <h2 className="h-title">Train</h2>
     <p className="h-sub">Calisthenics, barbell, dumbbell, kettlebell, landmine, cardio, abs, functional. Every split is fully editable — add, remove, edit, swap — or build your own from scratch.</p>
     {view!=="session"&&view!=="builder"&&<div className="seg">
       <button className={view==="splits"?"on":""} onClick={()=>setView("splits")}>Splits</button>
       <button className={view==="library"?"on":""} onClick={()=>setView("library")}>Exercise Library</button>
     </div>}
     {view==="splits"&&<>
       <button className="btn verd full" onClick={()=>{setActive({split:{id:uid(),n:"",focus:"",days:[{n:"Day 1",items:[]}]},dayIdx:0,sourceId:null,mine:true,isNew:true});setView("builder");}}>＋ Build New Split</button>
       {ctx.mySplits.length>0&&<p className="eyebrow" style={{marginTop:16}}>Your Splits</p>}
       {ctx.mySplits.map(sp=><SplitCard key={sp.id} sp={sp} exById={exById} onOpen={openSplit} onDelete={()=>ctx.setMySplits(s=>s.filter(x=>x.id!==sp.id))}/>)}
       <p className="eyebrow" style={{marginTop:ctx.mySplits.length?16:8}}>Library Programs</p>
       {DEFAULT_SPLITS.map(sp=><SplitCard key={sp.id} sp={sp} exById={exById} onOpen={openSplit}/>)}
     </>}
     {view==="library"&&<>
       <button className="btn full" onClick={()=>setShowAddEx(true)}>＋ Add Custom Exercise</button>
       <div className="seg" style={{marginTop:12}}>
         <button className={libCat==="All"?"on":""} onClick={()=>setLibCat("All")}>All</button>
         {CATS.map(c=><button key={c} className={libCat===c?"on":""} onClick={()=>setLibCat(c)}>{c}</button>)}
       </div>
       <div className="card">
         {allEx.filter(e=>libCat==="All"||e.cat===libCat).map(e=>(
           <div className="li" key={e.id}>
             <div style={{flex:1}}><div className="t">{e.n}{e.custom&&<span className="pill verd" style={{marginLeft:8}}>yours</span>}</div><div className="d">{e.cue}</div></div>
             <div style={{textAlign:"right"}}><span className="pill ox">{e.p}</span><div className="faint" style={{fontSize:11,marginTop:4}}>{e.cat}</div></div>
           </div>
         ))}
       </div>
     </>}
     {view==="builder"&&active&&<Builder active={active} setActive={setActive} setPicker={setPicker} exById={exById}
        onCancel={()=>{setView("splits");setActive(null);}}
        onSave={()=>{if(!active.split.n.trim()){ctx.ping("Name your split first");return;}
          ctx.setMySplits(s=>[active.split,...s]);ctx.ping("Split created");setView("splits");setActive(null);}}/>}
     {view==="session"&&active&&(()=>{const day=active.split.days[active.dayIdx];return <>
       <button className="btn ghost sm" onClick={()=>{setView("splits");setActive(null);}}>← Back</button>
       {active.split.days.length>1&&<div className="seg" style={{marginTop:12}}>
         {active.split.days.map((d,i)=><button key={i} className={active.dayIdx===i?"on":""} onClick={()=>setDay(i)}>{d.n}</button>)}
       </div>}
       <div className="card" data-acc="ox" style={{marginTop:12}}>
         <div className="between">
           <div><p className="eyebrow" style={{margin:0}}>{active.split.n}</p><h3 className="serif" style={{fontSize:24,margin:"2px 0"}}>{day.n}</h3></div>
           <button className={"btn xs "+(editMode?"verd":"")} onClick={()=>setEditMode(!editMode)}>{editMode?"Done":"Edit"}</button>
         </div>
         <hr className="divider"/>
         {day.items.length===0&&<p className="muted center" style={{fontSize:13}}>No movements yet — tap “Add exercise”.</p>}
         {day.items.map((it,i)=>{const ex=exById(it.ex);return (
           <div className="li" key={i}>
             {!editMode&&<button onClick={()=>setDone(d=>({...d,[i]:!d[i]}))} style={{flex:"none",width:26,height:26,borderRadius:8,border:"1px solid var(--line)",background:done[i]?"var(--gold)":"transparent",color:"var(--night)",fontWeight:800}}>{done[i]?"✓":""}</button>}
             {editMode&&<button className="xbtn" onClick={()=>removeItem(i)}>×</button>}
             <div style={{flex:1}}>
               <div className="t" style={{textDecoration:done[i]&&!editMode?"line-through":"none",opacity:done[i]&&!editMode?.5:1}}>{ex.n}</div>
               {!editMode&&<div className="d">{it.sets} × {it.reps} · {ex.cue}</div>}
               {editMode&&<div className="row" style={{gap:6,marginTop:6}}>
                 <input className="in mini" style={{width:56}} value={it.sets} onChange={e=>editItem(i,"sets",e.target.value)} placeholder="sets"/>
                 <span className="faint" style={{alignSelf:"center"}}>×</span>
                 <input className="in mini" style={{width:96}} value={it.reps} onChange={e=>editItem(i,"reps",e.target.value)} placeholder="reps"/>
               </div>}
             </div>
             {!editMode&&<button className="btn xs ghost" onClick={()=>setPicker({mode:"swap",dayIdx:active.dayIdx,itemIdx:i,pattern:ex.p})}>Swap</button>}
           </div>
         );})}
         <button className="btn sm full" style={{marginTop:12}} onClick={()=>setPicker({mode:"add",dayIdx:active.dayIdx,pattern:null})}>＋ Add exercise</button>
         <div className="row" style={{marginTop:10}}>
           <button className="btn gold full" onClick={finish}>Finish &amp; Log</button>
           <button className="btn" onClick={saveSplit}>{active.mine?"Save":"Save as mine"}</button>
         </div>
       </div>
     </>;})()}
     {picker&&<Sheet onClose={()=>setPicker(null)} title={picker.mode==="swap"?"Swap exercise":"Add exercise"}>

       {sheet.note&&<div className="note verd"><p className="muted" style={{fontSize:13,margin:0}}><b>Note:</b> {sheet.note}</p></div>}
       <div className="row" style={{marginTop:14}}>
         <button className="btn gold full" onClick={()=>{ctx.addLog({type:"practice",title:sheet.n,body:sheet.purpose});setSheet(null);}}>Complete &amp; Log</button>
         {!ctx.framework.includes(sheet.id)&&<button className="btn" onClick={()=>toggleFw(sheet.id)}>+ Framework</button>}
       </div>
     </Sheet>}
   </div>
  );
}
function Mind({ctx}){
  const [lens,setLens]=useState("Jungian");
  const [open,setOpen]=useState(null);
  const [sheet,setSheet]=useState(null);
  const list=MIND.filter(m=>m.lens===lens);
  return (
   <div className="page">
     <p className="eyebrow">Mind · The Bridge</p>
     <h2 className="h-title">Mind</h2>
     <p className="h-sub">Six lenses on the same psyche — Jung, IFS, Stoicism, Wilson's circuits, Hermetics, Eastern. Each entry: what it is, an exercise to run, and a prompt to reflect on.</p>
     <div className="seg verd">{LENSES.map(l=><button key={l} className={lens===l?"on":""} onClick={()=>setLens(l)}>{l}</button>)}</div>
     {list.map(m=>(<div className="card" data-acc="verd" key={m.id}>
       <h3 className="serif" style={{fontSize:21,margin:"0 0 6px"}}>{m.n}</h3>
       <p className="muted" style={{fontSize:13.5,lineHeight:1.65,margin:0}}>{m.body}</p>
       {open===m.id?<>
         <div className="note verd"><p className="eyebrow" style={{margin:"0 0 4px"}}>The exercise</p><p className="muted" style={{fontSize:13.5,margin:0}}>{m.practice}</p></div>
         <div className="note"><p className="eyebrow" style={{margin:"0 0 4px"}}>Reflect on</p><p className="serif" style={{fontSize:17,fontStyle:"italic",margin:0,color:"var(--parch)"}}>{m.prompt}</p></div>
         <div className="row" style={{marginTop:12}}>
           <button className="btn sm gold full" onClick={()=>setSheet(m)}>Reflect &amp; log</button>
           <button className="btn sm" onClick={()=>setOpen(null)}>Close</button>
         </div>
       </>:<button className="btn xs" style={{marginTop:10}} onClick={()=>setOpen(m.id)}>Exercise &amp; prompt</button>}
     </div>))}
     {sheet&&<Sheet onClose={()=>setSheet(null)} title={sheet.n}>
       <p className="muted" style={{fontSize:13.5,marginTop:0}}>{sheet.practice}</p>
       <div className="note"><p className="serif" style={{fontSize:18,fontStyle:"italic",margin:0,color:"var(--parch)"}}>{sheet.prompt}</p></div>
       <span className="lbl" style={{marginTop:14}}>Your reflection</span>
       <ReflectBox onSave={(text)=>{ctx.addLog({type:"mind",title:sheet.n+" — "+sheet.lens,body:text});setSheet(null);}}/>
     </Sheet>}
   </div>
  );
}
function ReflectBox({onSave}){
  const [text,setText]=useState("");
  return <>
    <textarea className="in" value={text} onChange={e=>setText(e.target.value)} placeholder="Write what came up…"/>
    <button className="btn gold full" style={{marginTop:12}} disabled={!text.trim()} onClick={()=>onSave(text.trim())}>Save to Journal</button>
  </>;
}
function Journal({ctx}){
  const [filter,setFilter]=useState("all");
  const [compose,setCompose]=useState(false);
  const [detail,setDetail]=useState(null);
  const types=[["all","All"],["practice","Practice"],["mind","Mind"],["workout","Train"],["meal","Fuel"],["biohack","Hacks"],["quiz","Test"],["free","Notes"]];
  const list=ctx.log.filter(e=>filter==="all"||e.type===filter);
  const groups=list.reduce((a,e)=>{const d=e.ts.slice(0,10);(a[d]=a[d]||[]).push(e);return a;},{});
  return (
   <div className="page">
     <p className="eyebrow">The Record</p>
     <h2 className="h-title">Journal</h2>
     <p className="h-sub">The instrument that makes consistency and honesty visible. Everything you log lands here — your real record, not the story you tell yourself.</p>
     <button className="btn gold full" onClick={()=>setCompose(true)}>＋ New Entry</button>
     <div className="seg" style={{marginTop:12}}>{types.map(([k,l])=><button key={k} className={filter===k?"on":""} onClick={()=>setFilter(k)}>{l}</button>)}</div>
     {list.length===0?<div className="empty"><div className="big">📖</div>No entries yet.<br/>Your practice begins with the first line.</div>
      :Object.keys(groups).sort().reverse().map(d=>(
       <div key={d}><p className="eyebrow" style={{marginTop:16}}>{fmtDate(d)}</p>
         <div className="card">{groups[d].map(e=>(
           <div className="li" key={e.id} onClick={()=>setDetail(e)} style={{cursor:"pointer"}}>
             <div style={{flex:1}}><div className="t">{e.title}</div><div className="d">{fmtTime(e.ts)}{e.body?" · "+e.body.slice(0,52)+(e.body.length>52?"…":""):""}</div></div>
             <TypeTag t={e.type}/>
           </div>))}</div>
       </div>))}
     {compose&&<Sheet onClose={()=>setCompose(false)} title="New Journal Entry">
       <ComposeBox onSave={(title,body)=>{ctx.addLog({type:"free",title,body});setCompose(false);}}/>
     </Sheet>}
     {detail&&<Sheet onClose={()=>setDetail(null)} title={detail.title}>
       <div className="faint" style={{fontSize:12,marginBottom:8}}>{fmtDate(detail.ts)} · {fmtTime(detail.ts)} · <TypeTag t={detail.type}/></div>
       <p className="muted" style={{fontSize:14.5,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{detail.body||"—"}</p>
       <button className="btn ghost danger full" style={{marginTop:14}} onClick={()=>{ctx.setLog(l=>l.filter(x=>x.id!==detail.id));setDetail(null);ctx.ping("Entry deleted");}}>Delete entry</button>
     </Sheet>}
   </div>
  );
}
function ComposeBox({onSave}){
  const [title,setTitle]=useState("");const [body,setBody]=useState("");
  return <>
    <span className="lbl">Title</span><input className="in" value={title} onChange={e=>setTitle(e.target.value)} placeholder="What's this about?"/>
    <span className="lbl" style={{marginTop:12}}>Entry</span>
    <textarea className="in" value={body} onChange={e=>setBody(e.target.value)} placeholder="Be honest. The record only works if it's true."/>
    <button className="btn gold full" style={{marginTop:12}} disabled={!title.trim()} onClick={()=>onSave(title.trim(),body.trim())}>Save Entry</button>
  </>;
}
function Test({ctx}){
  const [domain,setDomain]=useState(null);
  const [qi,setQi]=useState(0);const [picked,setPicked]=useState(null);const [score,setScore]=useState(0);const [done,setDone]=useState(false);
  const domains=Object.keys(QUIZZES);
  function start(d){setDomain(d);setQi(0);setPicked(null);setScore(0);setDone(false);}
  function pick(i){
    if(picked!=null)return;setPicked(i);
    const correct=QUIZZES[domain][qi].c===i;if(correct)setScore(s=>s+1);
    setTimeout(()=>{
      if(qi+1<QUIZZES[domain].length){setQi(qi+1);setPicked(null);}
      else{setDone(true);const final=score+(correct?1:0);const best=ctx.scores[domain]||0;
        if(final>best)ctx.setScores(s=>({...s,[domain]:final}));
        ctx.addLog({type:"quiz",title:domain+" quiz",body:"Scored "+final+"/"+QUIZZES[domain].length});}
    },900);
  }
  if(!domain) return (
   <div className="page">
     <p className="eyebrow">Mind · Sharpen</p>
     <h2 className="h-title">Test</h2>
     <p className="h-sub">Knowledge isn't your gap — but recall keeps the framework live. Quick quizzes across body and spirit.</p>
     {domains.map(d=>(<div className="card" data-acc="verd" key={d}>
       <div className="between"><div><h3 className="serif" style={{fontSize:19,margin:0}}>{d}</h3><div className="faint" style={{fontSize:12}}>{QUIZZES[d].length} questions{ctx.scores[d]!=null?" · best "+ctx.scores[d]+"/"+QUIZZES[d].length:""}</div></div>
         <button className="btn sm gold" onClick={()=>start(d)}>Start</button></div>
     </div>))}
   </div>
  );
  if(done){const final=score;const total=QUIZZES[domain].length;return (
   <div className="page">
     <div className="card center" data-acc="brass" style={{paddingTop:30,paddingBottom:30}}>
       <p className="eyebrow">{domain}</p>
       <div className="kpi" style={{fontSize:56}}>{final}/{total}</div>
       <p className="muted" style={{marginTop:8}}>{final===total?"Mastery. The work shows.":final>=total*0.6?"Solid. Keep it live.":"Worth a revisit — go back to the source."}</p>
       <div className="row" style={{marginTop:16,justifyContent:"center"}}>
         <button className="btn gold" onClick={()=>start(domain)}>Retry</button>
         <button className="btn" onClick={()=>setDomain(null)}>All quizzes</button>
       </div>
     </div>
   </div>
  );}
  const q=QUIZZES[domain][qi];
  return (
   <div className="page">
     <button className="btn ghost sm" onClick={()=>setDomain(null)}>← Exit</button>
     <div className="between" style={{margin:"14px 0"}}><span className="faint" style={{fontSize:12,letterSpacing:1}}>{domain.toUpperCase()}</span><span className="faint" style={{fontSize:12}}>{qi+1} / {QUIZZES[domain].length}</span></div>
     <div className="bar verd" style={{marginBottom:18}}><i style={{width:((qi)/QUIZZES[domain].length*100)+"%"}}/></div>
     <h3 className="serif" style={{fontSize:23,lineHeight:1.25,marginBottom:18}}>{q.q}</h3>
     {q.a.map((opt,i)=>{let cls="opt";if(picked!=null){if(i===q.c)cls+=" correct";else if(i===picked)cls+=" wrong";}
       return <button key={i} className={cls} onClick={()=>pick(i)}>{opt}</button>;})}
   </div>
  );
}
function Sheet({title,children,onClose}){
  return (
   <div className="scrim" onClick={onClose}>
     <div className="sheet" onClick={e=>e.stopPropagation()}>
       <div className="grab"/>
       <div className="between" style={{marginBottom:12}}>
         <h3 className="serif" style={{fontSize:23,margin:0}}>{title}</h3>
         <button className="btn sm ghost" onClick={onClose}>✕</button>
       </div>
       {children}
     </div>
   </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
